name: Processar marcas de água

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: fotografia-arnaut-watermarks
  cancel-in-progress: false

jobs:
  process-watermarks:
    name: Processar fotografias pendentes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      WATERMARK_LOGO_PATH: assets/logo-watermark.svg
      WATERMARK_WORKER_LIMIT: 24

    steps:
      - name: Obter código
        uses: actions/checkout@v4

      - name: Preparar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Processar marcas de água
        run: npm run process:watermarks
