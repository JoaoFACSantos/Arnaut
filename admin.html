<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#f1ede4" />
    <title>Administração — Fotografia Arnaut</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Manrope:wght@300;400;500;600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script type="module" src="admin.js"></script>
  </head>
  <body class="utility-page">
    <header class="site-header is-scrolled" data-header>
      <a class="brand" href="index.html" aria-label="Fotografia Arnaut — início">
        <img class="brand__logo-img" src="assets/logo-arnaut.png" alt="Fotografia Arnaut" />
      </a>
      <nav class="desktop-nav" aria-label="Navegação principal">
        <a href="index.html">Site</a>
        <a href="galeria.html">Galerias privadas</a>
      </nav>
      <button class="header-cta admin-logout" type="button" data-logout hidden>Terminar sessão</button>
    </header>

    <main class="admin-shell">
      <section class="admin-login" data-admin-login>
        <p class="section-index">Administração</p>
        <h1>Painel de gestão</h1>
        <p class="admin-login__intro">
          Acesso reservado para gestão de galerias privadas, eventos e fotografias.
        </p>
        <form class="private-form" data-login-form>
          <label>
            <span>Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span>Palavra-passe</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">Entrar <span>↗</span></button>
          <p class="form-message" data-login-message aria-live="polite"></p>
        </form>
      </section>

      <section class="admin-app" data-admin-app hidden>
        <div class="admin-sidebar">
          <div class="admin-sidebar__top">
            <p class="section-index">Álbuns</p>
            <button type="button" data-new-album>Novo álbum</button>
          </div>
          <div class="admin-album-list" data-album-list></div>
        </div>

        <form class="admin-editor" data-album-form>
          <input type="hidden" name="id" />
          <div class="admin-editor__head">
            <div>
              <p class="section-index">Detalhes</p>
              <h1>Gerir galeria</h1>
            </div>
            <div class="admin-editor__actions">
              <button type="button" data-copy-link disabled>Copiar link</button>
              <button type="button" data-delete-album disabled>Eliminar</button>
              <button type="submit">Guardar</button>
            </div>
          </div>

          <div class="admin-grid">
            <label>
              <span>Nome do evento</span>
              <input name="title" required />
            </label>
            <label>
              <span>Slug</span>
              <input name="slug" required placeholder="casamento-ana-pedro" />
            </label>
            <label>
              <span>Data</span>
              <input name="eventDate" type="date" />
            </label>
            <label>
              <span>Localização</span>
              <input name="location" />
            </label>
            <label class="admin-grid__wide">
              <span>Descrição / mensagem</span>
              <textarea name="description" rows="4"></textarea>
            </label>
            <label>
              <span>Código novo</span>
              <input name="accessCode" type="password" autocomplete="new-password" placeholder="Não é mostrado depois de guardar" />
            </label>
            <label>
              <span>Expira em</span>
              <input name="expiresAt" type="datetime-local" />
            </label>
            <label class="admin-grid__wide">
              <span>Caminho da capa</span>
              <input name="coverPath" readonly />
            </label>
          </div>

          <div class="admin-switches">
            <label><input name="isActive" type="checkbox" checked /> Galeria ativa</label>
            <label><input name="downloadsEnabled" type="checkbox" /> Permitir downloads</label>
            <label><input name="isArchived" type="checkbox" /> Arquivada</label>
          </div>

          <p class="form-message" data-album-message aria-live="polite"></p>

          <section class="admin-upload">
            <div>
              <p class="section-index">Fotografias</p>
              <input data-photo-upload type="file" accept="image/jpeg,image/png,image/webp" multiple disabled />
              <progress data-upload-progress value="0" max="1"></progress>
            </div>
            <div class="admin-photo-list" data-photo-list></div>
          </section>
        </form>
      </section>
    </main>
  </body>
</html>
